name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: home-loan-optimizer
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint || echo "Linting completed with warnings"
      continue-on-error: true
    
    - name: Check formatting
      run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}" || echo "Formatting check completed"
      continue-on-error: true

