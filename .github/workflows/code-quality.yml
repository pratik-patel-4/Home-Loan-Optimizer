name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: home-loan-optimizer/package-lock.json
    
    - name: Install dependencies
      run: |
        cd home-loan-optimizer
        npm ci
    
    - name: Run ESLint
      run: |
        cd home-loan-optimizer
        npm run lint || echo "Linting completed with warnings"
    
    - name: Check formatting
      run: |
        cd home-loan-optimizer
        npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}" || echo "Formatting check completed"

